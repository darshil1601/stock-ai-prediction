name: Sync to Hugging Face

on:
  push:
    branches:
      - main  # Every push to main syncs code to HF Space
  workflow_run:
    workflows: ["Train AI Models"]
    types:
      - completed

jobs:
  deploy:
    name: Sync Code to HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run for direct push OR when training workflow succeeds
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install huggingface_hub
        run: pip install huggingface_hub

      - name: 🚀 Push Code to HF Space (clean history, no binaries)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Stage code in a temp directory
          mkdir hf_payload

          # Copy backend code preserving folder structure (Dockerfile expects backend/)
          mkdir -p hf_payload/backend
          rsync -av \
            --exclude='*.h5' \
            --exclude='*.pkl' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            backend/ hf_payload/backend/

          # Copy HF Space required config files
          cp backend/README.md hf_payload/README.md 2>/dev/null || true
          cp Dockerfile hf_payload/Dockerfile 2>/dev/null || true
          cp runtime.txt hf_payload/runtime.txt 2>/dev/null || true

          # Init a FRESH git repo (orphan = no history = no binary files ever)
          cd hf_payload
          git init
          git checkout --orphan main
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "sync: clean code deploy from GitHub Actions"

          # Force push the clean history to HF Space (no binaries in history)
          git push --force \
            https://darshil16:$HF_TOKEN@huggingface.co/spaces/darshil16/stock-prediction-api \
            main

          echo "✅ Clean code sync to HF Space complete."

      - name: 📤 Upload Model Files to HF Space via API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import glob, os
          from huggingface_hub import HfApi

          api = HfApi()
          model_files = glob.glob("backend/app/models/*.h5") + glob.glob("backend/app/models/*.pkl")

          if not model_files:
              print("⚠️  No model files found to upload.")
          else:
              for f in model_files:
                  # Dockerfile does: COPY backend/ . → /app/
                  # So models must be at backend/app/models/ in HF Space repo
                  # which becomes /app/app/models/ in Docker container
                  dest = f"backend/app/models/{os.path.basename(f)}"
                  print(f"📤 Uploading {f} → {dest}")
                  api.upload_file(
                      path_or_fileobj=f,
                      path_in_repo=dest,
                      repo_id="darshil16/stock-prediction-api",
                      repo_type="space",
                      token=os.environ["HF_TOKEN"],
                  )
                  print(f"✅ Uploaded: {dest}")
          EOF
