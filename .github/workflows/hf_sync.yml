name: Sync to Hugging Face

on:
  push:
    branches:
      - main  # Every push to main syncs to HF Space
  workflow_run:
    workflows: ["Train AI Models"]
    types:
      - completed

jobs:
  deploy:
    name: Sync to HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run for direct push OR when training workflow succeeds
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🚀 Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://darshil16:$HF_TOKEN@huggingface.co/spaces/darshil16/stock-prediction-api main
