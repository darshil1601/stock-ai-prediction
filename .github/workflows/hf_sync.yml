name: Sync to Hugging Face

on:
  push:
    branches:
      - main  # Every push to main syncs code to HF Space
  workflow_run:
    workflows: ["Train AI Models"]
    types:
      - completed

jobs:
  deploy:
    name: Sync Code to HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run for direct push OR when training workflow succeeds
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true  # Required: download actual .h5/.pkl files, not LFS pointers

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install huggingface_hub
        run: pip install huggingface_hub

      - name: 🚀 Push Code to HF Space (clean history, no binaries)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Stage code in a temp directory
          mkdir hf_payload

          # Copy backend code preserving folder structure (Dockerfile expects backend/)
          mkdir -p hf_payload/backend
          rsync -av \
            --exclude='*.h5' \
            --exclude='*.pkl' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            backend/ hf_payload/backend/

          # Copy HF Space required config files
          cp backend/README.md hf_payload/README.md 2>/dev/null || true
          cp Dockerfile hf_payload/Dockerfile 2>/dev/null || true
          cp runtime.txt hf_payload/runtime.txt 2>/dev/null || true

          # Init a FRESH git repo (orphan = no history = no binary files ever)
          cd hf_payload
          git init
          git checkout --orphan main
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "sync: clean code deploy from GitHub Actions"

          # Force push the clean history to HF Space (no binaries in history)
          git push --force \
            https://darshil16:$HF_TOKEN@huggingface.co/spaces/darshil16/stock-prediction-api \
            main

          echo "✅ Clean code sync to HF Space complete."

      - name: 📤 Upload Model Files to HF Space via API (Batch)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import glob, os, re
          from huggingface_hub import HfApi

          api = HfApi()
          REPO_ID = "darshil16/stock-prediction-api"
          REPO_TYPE = "space"
          LOCAL_MODELS_DIR = "backend/app/models"
          HF_MODELS_DIR = "backend/app/models"
          KEEP_VERSIONS = 3  # How many old versions to keep per symbol
          SYMBOLS = ["btcusd", "eurusd", "xauusd"]

          # ── Step 1: Cleanup old versions on HF Space ──────────────────────────
          print("🧹 Cleaning up old model versions on HF Space...")
          try:
              all_hf_files = api.list_repo_files(
                  repo_id=REPO_ID, repo_type=REPO_TYPE,
                  token=os.environ["HF_TOKEN"]
              )
              all_hf_files = list(all_hf_files)

              for slug in SYMBOLS:
                  # Versioned models e.g. btcusd_model_v20260416131908.h5
                  ver_models = sorted([
                      f for f in all_hf_files
                      if re.match(rf"backend/app/models/{slug}_model_v\d+\.h5$", f)
                  ])
                  ver_scalers = sorted([
                      f for f in all_hf_files
                      if re.match(rf"backend/app/models/{slug}_scaler_v\d+\.pkl$", f)
                  ])

                  to_delete = ver_models[:-KEEP_VERSIONS] + ver_scalers[:-KEEP_VERSIONS]
                  for old_file in to_delete:
                      try:
                          api.delete_file(
                              path_in_repo=old_file,
                              repo_id=REPO_ID, repo_type=REPO_TYPE,
                              token=os.environ["HF_TOKEN"],
                              commit_message=f"chore: cleanup old {slug} model versions"
                          )
                          print(f"  🗑️  Deleted from HF: {old_file}")
                      except Exception as e:
                          print(f"  ⚠️  Could not delete {old_file}: {e}")

          except Exception as e:
              print(f"⚠️  HF cleanup skipped (non-fatal): {e}")

          # ── Step 2: Upload ALL current local model files in ONE single commit ──
          model_files = (
              glob.glob(f"{LOCAL_MODELS_DIR}/*.h5") +
              glob.glob(f"{LOCAL_MODELS_DIR}/*.pkl")
          )

          if not model_files:
              print("⚠️  No model files found to upload.")
          else:
              print(f"📤 Uploading {len(model_files)} model file(s) as a SINGLE batch commit...")
              api.upload_folder(
                  folder_path=LOCAL_MODELS_DIR,
                  path_in_repo=HF_MODELS_DIR,
                  repo_id=REPO_ID,
                  repo_type=REPO_TYPE,
                  token=os.environ["HF_TOKEN"],
                  allow_patterns=["*.h5", "*.pkl"],
                  commit_message="chore: batch update trained models",
              )
              print(f"✅ Batch upload complete! {len(model_files)} files pushed in 1 commit.")
          EOF
